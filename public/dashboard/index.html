<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — AI Lead Intel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg-elevated: #111111;
      --card: #141414;
      --card-hover: #1a1a1a;
      --border: #262626;
      --border-hover: #333;
      --text: #fafafa;
      --text-dim: #a1a1a1;
      --text-faint: #525252;
      --accent: #ff6a00;
      --accent-hover: #ff8c33;
      --accent-dim: rgba(255, 106, 0, 0.1);
      --hot-bg: rgba(220, 38, 38, 0.15);
      --hot-border: rgba(220, 38, 38, 0.4);
      --hot-text: #fca5a5;
      --warm-bg: rgba(234, 179, 8, 0.15);
      --warm-border: rgba(234, 179, 8, 0.4);
      --warm-text: #fde047;
      --cold-bg: rgba(59, 130, 246, 0.15);
      --cold-border: rgba(59, 130, 246, 0.4);
      --cold-text: #93c5fd;
      --none-bg: rgba(115, 115, 115, 0.15);
      --none-border: rgba(115, 115, 115, 0.4);
      --none-text: #a3a3a3;
      --won-bg: rgba(34, 197, 94, 0.15);
      --won-border: rgba(34, 197, 94, 0.4);
      --won-text: #86efac;
      --lost-bg: rgba(115, 115, 115, 0.15);
      --lost-border: rgba(115, 115, 115, 0.4);
      --lost-text: #a3a3a3;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* NAVBAR */
    .navbar {
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-left { display: flex; align-items: center; gap: 24px; }
    .nav-logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ff6a00 0%, #ff9a00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-business {
      font-size: 13px;
      color: var(--text-dim);
      padding-left: 24px;
      border-left: 1px solid var(--border);
    }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-email { font-size: 13px; color: var(--text-dim); }
    .signout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }
    .signout-btn:hover { color: var(--text); border-color: var(--border-hover); }

    /* CONTAINER */
    .container { max-width: 1280px; margin: 0 auto; padding: 32px 28px; }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .header-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 9px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-btn:hover {
      color: var(--text);
      border-color: var(--border-hover);
      background: var(--card-hover);
    }

    /* STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      transition: all 0.15s;
    }
    .stat-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
    .stat-label {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .stat-value.hot { color: var(--hot-text); }
    .stat-value.accent { color: var(--accent); }
    .stat-value.won { color: var(--won-text); }

    /* CHART */
    .chart-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .chart-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .chart-subtitle {
      font-size: 12px;
      color: var(--text-dim);
    }
    .chart-container {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 100px;
      padding-top: 8px;
    }
    .chart-bar {
      flex: 1;
      background: linear-gradient(to top, var(--accent), var(--accent-hover));
      border-radius: 3px 3px 0 0;
      min-height: 2px;
      position: relative;
      transition: opacity 0.15s;
      cursor: pointer;
    }
    .chart-bar:hover { opacity: 0.8; }
    .chart-bar.empty {
      background: var(--border);
    }
    .chart-bar-tooltip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      margin-bottom: 6px;
      z-index: 10;
    }
    .chart-bar:hover .chart-bar-tooltip { opacity: 1; }

    /* CALLS SECTION */
    .calls-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .section-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .section-title { font-size: 15px; font-weight: 600; }

    .controls-row {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--bg-elevated);
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 9px 14px 9px 36px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
    }
    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 14px;
    }

    .filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 500;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--border-hover); }
    .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .filter-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }

    /* TABLE */
    .calls-table { width: 100%; }
    .calls-table th {
      text-align: left;
      padding: 14px 24px;
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elevated);
    }
    .calls-table td {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      vertical-align: middle;
    }
    .calls-table tr:last-child td { border-bottom: none; }
    .calls-table tr.call-row { cursor: pointer; transition: background 0.15s; }
    .calls-table tr.call-row:hover { background: var(--card-hover); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      border: 1px solid;
    }
    .badge.hot { background: var(--hot-bg); border-color: var(--hot-border); color: var(--hot-text); }
    .badge.warm { background: var(--warm-bg); border-color: var(--warm-border); color: var(--warm-text); }
    .badge.cold { background: var(--cold-bg); border-color: var(--cold-border); color: var(--cold-text); }
    .badge.none { background: var(--none-bg); border-color: var(--none-border); color: var(--none-text); }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid;
    }
    .status-pill.new { background: var(--cold-bg); border-color: var(--cold-border); color: var(--cold-text); }
    .status-pill.contacted { background: var(--warm-bg); border-color: var(--warm-border); color: var(--warm-text); }
    .status-pill.closed_won { background: var(--won-bg); border-color: var(--won-border); color: var(--won-text); }
    .status-pill.closed_lost { background: var(--lost-bg); border-color: var(--lost-border); color: var(--lost-text); }

    .phone-cell { font-family: 'SF Mono', Monaco, monospace; font-size: 13px; }
    .duration-cell { color: var(--text-dim); font-size: 13px; }
    .time-cell { color: var(--text-dim); font-size: 13px; }
    .outcome-cell {
      color: var(--text-dim);
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* EXPAND ROW */
    .expand-row td { background: var(--bg-elevated); padding: 0; }
    .expand-content {
      padding: 24px;
      animation: slideDown 0.2s ease-out;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .expand-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 768px) {
      .expand-grid { grid-template-columns: 1fr; }
    }

    .expand-section { margin-bottom: 16px; }
    .expand-label {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .expand-value { font-size: 14px; line-height: 1.6; color: var(--text); }

    .transcript-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      max-height: 280px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      font-family: 'SF Mono', Monaco, monospace;
    }
    .transcript-box::-webkit-scrollbar { width: 6px; }
    .transcript-box::-webkit-scrollbar-track { background: transparent; }
    .transcript-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .audio-player {
      width: 100%;
      margin-top: 8px;
      border-radius: 8px;
    }

    .notes-textarea {
      width: 100%;
      min-height: 80px;
      padding: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.15s;
    }
    .notes-textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .notes-status {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
      min-height: 14px;
    }

    .status-buttons {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .status-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 500;
    }
    .status-btn:hover { background: var(--card-hover); border-color: var(--border-hover); }
    .status-btn.active.new { background: var(--cold-bg); border-color: var(--cold-border); color: var(--cold-text); }
    .status-btn.active.contacted { background: var(--warm-bg); border-color: var(--warm-border); color: var(--warm-text); }
    .status-btn.active.closed_won { background: var(--won-bg); border-color: var(--won-border); color: var(--won-text); }
    .status-btn.active.closed_lost { background: var(--lost-bg); border-color: var(--lost-border); color: var(--lost-text); }

    .actions-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .action-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .action-btn:hover { background: var(--card-hover); border-color: var(--border-hover); }
    .action-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .action-btn.primary:hover { background: var(--accent-hover); }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 1000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--won-border); }

    /* EMPTY */
    .empty-state { padding: 60px 24px; text-align: center; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
    .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .empty-text { color: var(--text-dim); font-size: 14px; max-width: 360px; margin: 0 auto; }

    /* MOBILE */
    @media (max-width: 768px) {
      .navbar { padding: 12px 16px; }
      .nav-business { display: none; }
      .container { padding: 20px 16px; }
      .page-title { font-size: 22px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .stat-value { font-size: 22px; }
      .calls-table th:nth-child(3),
      .calls-table td:nth-child(3),
      .calls-table th:nth-child(6),
      .calls-table td:nth-child(6) { display: none; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <div class="nav-logo">AI Lead Intel</div>
      <div class="nav-business" id="business-name">Loading...</div>
    </div>
    <div class="nav-right">
      <div class="nav-email" id="user-email"></div>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1 class="page-title">Dashboard</h1>
      <div class="header-actions">
        <button class="header-btn" onclick="exportCSV()">↓ Export CSV</button>
        <button class="header-btn" onclick="loadCalls()">↻ Refresh</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Calls</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Hot Leads</div>
        <div class="stat-value hot" id="stat-hot">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Closed Won</div>
        <div class="stat-value won" id="stat-won">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Duration</div>
        <div class="stat-value accent" id="stat-duration">—</div>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-header">
        <div>
          <div class="chart-title">Calls per day</div>
          <div class="chart-subtitle">Last 30 days</div>
        </div>
      </div>
      <div class="chart-container" id="chart-container"></div>
    </div>

    <div class="calls-section">
      <div class="section-header">
        <div class="section-title">Calls</div>
      </div>
      <div class="controls-row">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search by phone number..." oninput="renderCalls()" />
        </div>
        <div class="filters">
          <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
          <button class="filter-btn" data-filter="HOT" onclick="setFilter('HOT')">Hot</button>
          <button class="filter-btn" data-filter="WARM" onclick="setFilter('WARM')">Warm</button>
          <button class="filter-btn" data-filter="COLD" onclick="setFilter('COLD')">Cold</button>
          <div class="filter-divider"></div>
          <button class="filter-btn" data-date="today" onclick="setDateFilter('today')">Today</button>
          <button class="filter-btn" data-date="week" onclick="setDateFilter('week')">This week</button>
          <button class="filter-btn" data-date="month" onclick="setDateFilter('month')">This month</button>
          <button class="filter-btn active" data-date="all" onclick="setDateFilter('all')">All time</button>
        </div>
      </div>
      <div id="calls-container">
        <div style="padding: 60px; text-align: center; color: var(--text-dim);">Loading calls...</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://mbrhkeddgmywqqgdfdgx.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable__YkhmAu61Nr8VetJS8pJqA_MHrmO69t';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allCalls = [];
    let currentFilter = 'all';
    let dateFilter = 'all';
    let expandedRow = null;
    let realtimeChannel = null;

    async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = '/dashboard/login.html';
        return;
      }
      document.getElementById('user-email').textContent = session.user.email;

      const { data: clients } = await supabaseClient
        .from('clients')
        .select('business_name')
        .eq('owner_user_id', session.user.id)
        .limit(1);

      if (clients && clients.length > 0) {
        document.getElementById('business-name').textContent = clients[0].business_name;
      }

      await loadCalls();
      setupRealtime();
    }

    function setupRealtime() {
      if (realtimeChannel) return;
      realtimeChannel = supabaseClient
        .channel('calls-changes')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'calls' },
          () => { loadCalls(); showToast('New call received', 'success'); })
        .subscribe();
    }

    async function loadCalls() {
      const container = document.getElementById('calls-container');

      const { data: calls, error } = await supabaseClient
        .from('calls')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(200);

      if (error) {
        container.innerHTML = `<div style="padding: 40px; text-align: center; color: var(--text-dim);">Error: ${error.message}</div>`;
        return;
      }

      allCalls = calls || [];
      updateStats();
      updateChart();
      renderCalls();
    }

    function updateStats() {
      const total = allCalls.length;
      const hot = allCalls.filter(c => c.lead_score === 'HOT').length;
      const won = allCalls.filter(c => c.lead_status === 'CLOSED_WON').length;
      const totalDuration = allCalls.reduce((s, c) => s + (c.duration_seconds || 0), 0);
      const avgDuration = total > 0 ? Math.round(totalDuration / total) : 0;
      const avgMin = Math.floor(avgDuration / 60);
      const avgSec = avgDuration % 60;

      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-hot').textContent = hot;
      document.getElementById('stat-won').textContent = won;
      document.getElementById('stat-duration').textContent = total > 0 ? `${avgMin}:${String(avgSec).padStart(2, '0')}` : '—';
    }

    function updateChart() {
      const container = document.getElementById('chart-container');
      const days = [];
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      for (let i = 29; i >= 0; i--) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const next = new Date(date);
        next.setDate(next.getDate() + 1);
        const count = allCalls.filter(c => {
          const t = new Date(c.created_at);
          return t >= date && t < next;
        }).length;
        days.push({ date, count });
      }

      const maxCount = Math.max(...days.map(d => d.count), 1);

      container.innerHTML = days.map(d => {
        const height = d.count === 0 ? 2 : (d.count / maxCount) * 100;
        const dateStr = d.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        return `
          <div class="chart-bar ${d.count === 0 ? 'empty' : ''}" style="height: ${height}%;">
            <div class="chart-bar-tooltip">${dateStr}: ${d.count} call${d.count !== 1 ? 's' : ''}</div>
          </div>
        `;
      }).join('');
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn[data-filter]').forEach(b => {
        b.classList.toggle('active', b.dataset.filter === filter);
      });
      renderCalls();
    }

    function setDateFilter(filter) {
      dateFilter = filter;
      document.querySelectorAll('.filter-btn[data-date]').forEach(b => {
        b.classList.toggle('active', b.dataset.date === filter);
      });
      renderCalls();
    }

    function getFilteredCalls() {
      let filtered = allCalls;

      if (currentFilter !== 'all') {
        filtered = filtered.filter(c => c.lead_score === currentFilter);
      }

      if (dateFilter !== 'all') {
        const now = new Date();
        let cutoff;
        if (dateFilter === 'today') {
          cutoff = new Date(now); cutoff.setHours(0, 0, 0, 0);
        } else if (dateFilter === 'week') {
          cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 7);
        } else if (dateFilter === 'month') {
          cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 30);
        }
        filtered = filtered.filter(c => new Date(c.created_at) >= cutoff);
      }

      const search = document.getElementById('search-input').value.trim().toLowerCase();
      if (search) {
        filtered = filtered.filter(c =>
          (c.caller_number || '').toLowerCase().includes(search) ||
          (c.outcome || '').toLowerCase().includes(search)
        );
      }

      return filtered;
    }

    function renderCalls() {
      const container = document.getElementById('calls-container');
      const filtered = getFilteredCalls();

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📞</div>
            <div class="empty-title">No calls match</div>
            <div class="empty-text">Try changing filters or clearing the search.</div>
          </div>
        `;
        return;
      }

      let html = `
        <table class="calls-table">
          <thead>
            <tr>
              <th>Caller</th>
              <th>Lead</th>
              <th>Status</th>
              <th>Outcome</th>
              <th>Time</th>
              <th>Duration</th>
            </tr>
          </thead>
          <tbody>
      `;

      filtered.forEach((call, idx) => {
        const score = call.lead_score || 'NONE';
        const status = call.lead_status || 'NEW';
        const minutes = Math.floor((call.duration_seconds || 0) / 60);
        const seconds = (call.duration_seconds || 0) % 60;
        const duration = `${minutes}:${String(seconds).padStart(2, '0')}`;

        html += `
          <tr class="call-row" data-id="${call.id}" onclick="toggleExpand('${call.id}')">
            <td class="phone-cell">${escapeHtml(call.caller_number || 'Unknown')}</td>
            <td><span class="badge ${score.toLowerCase()}">${score}</span></td>
            <td><span class="status-pill ${status.toLowerCase()}">${formatStatus(status)}</span></td>
            <td class="outcome-cell">${escapeHtml(call.outcome || '—')}</td>
            <td class="time-cell">${formatTime(call.created_at)}</td>
            <td class="duration-cell">${duration}</td>
          </tr>
          <tr class="expand-row" id="expand-${call.id}" style="display: none;">
            <td colspan="6">
              <div class="expand-content">
                <div class="expand-grid">
                  <div>
                    ${call.summary ? `
                      <div class="expand-section">
                        <div class="expand-label">Summary</div>
                        <div class="expand-value">${escapeHtml(call.summary)}</div>
                      </div>
                    ` : ''}
                    <div class="expand-section">
                      <div class="expand-label">Lead Status</div>
                      <div class="status-buttons">
                        <button class="status-btn ${status === 'NEW' ? 'active new' : ''}" onclick="updateStatus('${call.id}', 'NEW')">New</button>
                        <button class="status-btn ${status === 'CONTACTED' ? 'active contacted' : ''}" onclick="updateStatus('${call.id}', 'CONTACTED')">Contacted</button>
                        <button class="status-btn ${status === 'CLOSED_WON' ? 'active closed_won' : ''}" onclick="updateStatus('${call.id}', 'CLOSED_WON')">Closed Won</button>
                        <button class="status-btn ${status === 'CLOSED_LOST' ? 'active closed_lost' : ''}" onclick="updateStatus('${call.id}', 'CLOSED_LOST')">Closed Lost</button>
                      </div>
                    </div>
                    <div class="expand-section">
                      <div class="expand-label">Notes</div>
                      <textarea class="notes-textarea" id="notes-${call.id}" placeholder="Add follow-up notes...">${escapeHtml(call.notes || '')}</textarea>
                      <div class="notes-status" id="notes-status-${call.id}"></div>
                    </div>
                  </div>
                  <div>
                    ${call.recording_url ? `
                      <div class="expand-section">
                        <div class="expand-label">Recording</div>
                        <audio class="audio-player" controls preload="none" src="${escapeAttr(call.recording_url)}"></audio>
                      </div>
                    ` : ''}
                    <div class="expand-section">
                      <div class="expand-label">Transcript</div>
                      <div class="transcript-box">${escapeHtml(call.transcript || 'No transcript available')}</div>
                    </div>
                  </div>
                </div>
                <div class="actions-row">
                  <a href="tel:${escapeAttr(call.caller_number)}" class="action-btn primary">📞 Call back</a>
                  ${call.recording_url ? `<a href="${escapeAttr(call.recording_url)}" target="_blank" class="action-btn">↗ Open recording</a>` : ''}
                </div>
              </div>
            </td>
          </tr>
        `;
      });

      html += '</tbody></table>';
      container.innerHTML = html;

      // Wire up notes auto-save
      filtered.forEach(call => {
        const ta = document.getElementById(`notes-${call.id}`);
        if (ta) {
          let timeout;
          ta.addEventListener('input', () => {
            clearTimeout(timeout);
            const status = document.getElementById(`notes-status-${call.id}`);
            status.textContent = 'Saving...';
            timeout = setTimeout(() => saveNotes(call.id, ta.value), 800);
          });
          ta.addEventListener('click', e => e.stopPropagation());
        }
      });
    }

    function toggleExpand(id) {
      const row = document.getElementById(`expand-${id}`);
      if (expandedRow !== null && expandedRow !== id) {
        const prev = document.getElementById(`expand-${expandedRow}`);
        if (prev) prev.style.display = 'none';
      }
      if (row.style.display === 'none') {
        row.style.display = 'table-row';
        expandedRow = id;
      } else {
        row.style.display = 'none';
        expandedRow = null;
      }
    }

    async function updateStatus(callId, newStatus) {
      event.stopPropagation();
      const { error } = await supabaseClient
        .from('calls')
        .update({ lead_status: newStatus })
        .eq('id', callId);

      if (error) {
        showToast('Failed to update: ' + error.message);
        return;
      }

      const call = allCalls.find(c => c.id === callId);
      if (call) call.lead_status = newStatus;
      updateStats();
      renderCalls();
      // Re-expand the row
      const row = document.getElementById(`expand-${callId}`);
      if (row) { row.style.display = 'table-row'; expandedRow = callId; }
      showToast('Status updated', 'success');
    }

    async function saveNotes(callId, notes) {
      const status = document.getElementById(`notes-status-${callId}`);
      const { error } = await supabaseClient
        .from('calls')
        .update({ notes, notes_updated_at: new Date().toISOString() })
        .eq('id', callId);

      if (error) {
        status.textContent = 'Save failed';
        return;
      }
      const call = allCalls.find(c => c.id === callId);
      if (call) call.notes = notes;
      status.textContent = 'Saved';
      setTimeout(() => { status.textContent = ''; }, 2000);
    }

    function exportCSV() {
      const filtered = getFilteredCalls();
      if (filtered.length === 0) {
        showToast('No calls to export');
        return;
      }
      const headers = ['Date', 'Caller', 'Duration (s)', 'Lead Score', 'Status', 'Outcome', 'Summary', 'Notes'];
      const rows = filtered.map(c => [
        new Date(c.created_at).toISOString(),
        c.caller_number || '',
        c.duration_seconds || 0,
        c.lead_score || '',
        c.lead_status || 'NEW',
        c.outcome || '',
        (c.summary || '').replace(/\n/g, ' '),
        (c.notes || '').replace(/\n/g, ' '),
      ]);
      const csv = [headers, ...rows]
        .map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
        .join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `calls-export-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('CSV exported', 'success');
    }

    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show ' + (type || '');
      setTimeout(() => { toast.className = 'toast ' + (type || ''); }, 2500);
    }

    function formatStatus(s) {
      if (s === 'CLOSED_WON') return 'Won';
      if (s === 'CLOSED_LOST') return 'Lost';
      if (s === 'CONTACTED') return 'Contacted';
      return 'New';
    }

    function formatTime(timestamp) {
      const d = new Date(timestamp);
      const now = new Date();
      const diffMin = Math.floor((now - d) / 60000);
      const diffHr = Math.floor(diffMin / 60);
      const diffDay = Math.floor(diffHr / 24);
      if (diffMin < 1) return 'just now';
      if (diffMin < 60) return `${diffMin}m ago`;
      if (diffHr < 24) return `${diffHr}h ago`;
      if (diffDay < 7) return `${diffDay}d ago`;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function escapeAttr(str) { return escapeHtml(str); }

    async function signOut() {
      if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
      await supabaseClient.auth.signOut();
      window.location.href = '/dashboard/login.html';
    }

    init();
  </script>
</body>
</html>
