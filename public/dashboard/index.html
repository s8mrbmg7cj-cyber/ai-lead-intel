<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission Control — AI Lead Intel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050505;
      --surface: #0a0a0a;
      --surface-elevated: #0f0f0f;
      --surface-hover: #141414;
      --border: rgba(255, 255, 255, 0.06);
      --border-strong: rgba(255, 255, 255, 0.12);
      --text: #f5f5f5;
      --text-dim: #888888;
      --text-faint: #555555;
      --brand: #ff6a00;
      --brand-glow: rgba(255, 106, 0, 0.35);
      --hot: #ef4444;
      --hot-glow: rgba(239, 68, 68, 0.3);
      --warm: #f59e0b;
      --cold: #3b82f6;
      --won: #10b981;
      --live: #00ff88;
    }

    html, body { height: 100%; }
    body {
      font-family: 'Geist', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.011em;
      overflow-x: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
      mask-image: radial-gradient(ellipse at center, black 0%, transparent 80%);
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--brand-glow) 0%, transparent 70%);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
      animation: drift 20s ease-in-out infinite;
    }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-100px, 100px); }
    }

    .mono { font-family: 'Geist Mono', monospace; font-feature-settings: 'tnum' 1; }

    /* TOP NAV */
    .topnav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(5, 5, 5, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-left { display: flex; align-items: center; gap: 20px; }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .logo-mark {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--brand) 0%, #ff9a00 100%);
      box-shadow: 0 0 24px var(--brand-glow);
      position: relative;
      overflow: hidden;
    }
    .logo-mark::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.25) 100%);
    }
    .nav-divider {
      width: 1px;
      height: 18px;
      background: var(--border);
    }
    .business-tag {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-dim);
      font-family: 'Geist Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .nav-right { display: flex; align-items: center; gap: 14px; }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 11px;
      border: 1px solid rgba(0, 255, 136, 0.2);
      border-radius: 99px;
      background: rgba(0, 255, 136, 0.05);
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      color: var(--live);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--live);
      box-shadow: 0 0 8px var(--live);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    .nav-email {
      font-size: 12px;
      color: var(--text-dim);
      font-family: 'Geist Mono', monospace;
    }
    .icon-btn {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface); }

    /* CONTAINER */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 36px 32px 80px;
      position: relative;
      z-index: 1;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 32px;
      gap: 16px;
    }
    .page-title-block .eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--text-faint);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .page-title {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .page-title .accent {
      background: linear-gradient(135deg, var(--brand) 0%, #ffaa55 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    .search-shell {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0 12px;
      width: 280px;
      transition: all 0.15s;
    }
    .search-shell:focus-within {
      border-color: var(--border-strong);
      background: var(--surface-elevated);
    }
    .search-shell svg { flex-shrink: 0; color: var(--text-faint); }
    .search-shell input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      padding: 9px 0;
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }
    .search-shell input::placeholder { color: var(--text-faint); }
    .kbd {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: var(--text-faint);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 5px;
      background: var(--bg);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 14px;
      border-radius: 9px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: var(--surface-elevated); border-color: var(--border-strong); }
    .btn.primary {
      background: linear-gradient(135deg, var(--brand) 0%, #ff8533 100%);
      border-color: var(--brand);
      box-shadow: 0 0 0 1px rgba(255,106,0,0.2), 0 4px 16px var(--brand-glow);
      color: #fff;
    }
    .btn.primary:hover { box-shadow: 0 0 0 1px rgba(255,106,0,0.3), 0 6px 24px var(--brand-glow); }

    /* STATS GRID */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      overflow: hidden;
      transition: all 0.2s;
    }
    .stat:hover { border-color: var(--border-strong); transform: translateY(-2px); }
    .stat::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-color, var(--border-strong)), transparent);
      opacity: 0.6;
    }
    .stat[data-color="hot"] { --accent-color: var(--hot); }
    .stat[data-color="brand"] { --accent-color: var(--brand); }
    .stat[data-color="won"] { --accent-color: var(--won); }
    .stat-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .stat-label {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .stat-icon {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      color: var(--accent-color, var(--text-dim));
    }
    .stat-value {
      font-family: 'Geist Mono', monospace;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
    }
    .stat-value.colored { color: var(--accent-color); }
    .stat-spark {
      margin-top: 14px;
      height: 28px;
      width: 100%;
    }

    /* CHART */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 24px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .chart-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-strong), transparent);
    }
    .chart-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px;
    }
    .chart-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .chart-sub {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--text-faint);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .chart-stats {
      display: flex;
      gap: 18px;
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
    }
    .chart-stats span b {
      color: var(--text);
      font-weight: 500;
    }
    .chart-svg {
      width: 100%;
      height: 140px;
      display: block;
    }

    /* CALLS SECTION */
    .calls-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .calls-head {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .calls-title-row { display: flex; align-items: center; gap: 12px; }
    .calls-title {
      font-size: 14px;
      font-weight: 500;
    }
    .calls-count {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--text-faint);
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--bg);
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 3px;
    }
    .pill {
      background: transparent;
      border: none;
      color: var(--text-dim);
      padding: 6px 11px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pill:hover { color: var(--text); }
    .pill.active {
      background: var(--surface-elevated);
      color: var(--text);
      box-shadow: inset 0 0 0 1px var(--border-strong);
    }
    .pill.active.hot { color: var(--hot); }
    .pill.active.warm { color: var(--warm); }
    .pill.active.cold { color: var(--cold); }

    /* TABLE */
    .table-wrap { overflow-x: auto; }
    .ctable { width: 100%; border-collapse: collapse; }
    .ctable thead th {
      text-align: left;
      padding: 11px 24px;
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: var(--text-faint);
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .ctable tbody tr {
      cursor: pointer;
      transition: background 0.12s;
      border-bottom: 1px solid var(--border);
    }
    .ctable tbody tr:last-child { border-bottom: none; }
    .ctable tbody tr:hover { background: var(--surface-elevated); }
    .ctable tbody tr.selected { background: rgba(255, 106, 0, 0.04); }
    .ctable tbody td {
      padding: 14px 24px;
      font-size: 13px;
      vertical-align: middle;
    }

    .caller {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .caller-avatar {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .caller-num {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 99px;
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      border: 1px solid;
    }
    .badge.hot { background: rgba(239, 68, 68, 0.08); border-color: rgba(239, 68, 68, 0.25); color: var(--hot); }
    .badge.warm { background: rgba(245, 158, 11, 0.08); border-color: rgba(245, 158, 11, 0.25); color: var(--warm); }
    .badge.cold { background: rgba(59, 130, 246, 0.08); border-color: rgba(59, 130, 246, 0.25); color: var(--cold); }
    .badge.none { background: rgba(255, 255, 255, 0.03); border-color: var(--border); color: var(--text-dim); }
    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 6px currentColor;
    }
    .badge.hot .badge-dot { animation: pulse 2s ease-in-out infinite; }

    .stage-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 5px;
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.05em;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .stage-pill.contacted { color: var(--warm); border-color: rgba(245, 158, 11, 0.2); }
    .stage-pill.closed_won { color: var(--won); border-color: rgba(16, 185, 129, 0.2); }
    .stage-pill.closed_lost { color: var(--text-faint); }

    .outcome-cell {
      color: var(--text-dim);
      font-size: 13px;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .time-cell {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--text-faint);
    }
    .duration-cell {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
    }

    /* EMPTY */
    .empty {
      padding: 80px 24px;
      text-align: center;
    }
    .empty-glyph {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      border-radius: 14px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      opacity: 0.6;
    }
    .empty-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .empty-sub { color: var(--text-dim); font-size: 13px; }

    /* SLIDE PANEL */
    .panel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 200;
    }
    .panel-overlay.open { opacity: 1; pointer-events: auto; }

    .panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 560px;
      max-width: 100vw;
      background: var(--surface);
      border-left: 1px solid var(--border-strong);
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 201;
      display: flex;
      flex-direction: column;
      box-shadow: -20px 0 60px rgba(0, 0, 0, 0.5);
    }
    .panel.open { transform: translateX(0); }
    .panel-head {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-head h3 {
      font-size: 14px;
      font-weight: 500;
    }
    .panel-head .panel-meta {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 2px;
    }
    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .panel-body::-webkit-scrollbar { width: 8px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .panel-section { margin-bottom: 24px; }
    .panel-section-label {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .panel-meta-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .meta-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 12px;
    }
    .meta-item-label {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }
    .meta-item-value {
      font-size: 13px;
      color: var(--text);
      font-family: 'Geist Mono', monospace;
    }

    .summary-block {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
    }

    .stage-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .stage-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 9px 6px;
      border-radius: 8px;
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    .stage-btn:hover { border-color: var(--border-strong); color: var(--text); }
    .stage-btn.active {
      background: var(--surface-elevated);
      color: var(--text);
      box-shadow: inset 0 0 0 1px var(--border-strong);
    }
    .stage-btn.active.contacted { color: var(--warm); box-shadow: inset 0 0 0 1px rgba(245, 158, 11, 0.4); }
    .stage-btn.active.closed_won { color: var(--won); box-shadow: inset 0 0 0 1px rgba(16, 185, 129, 0.4); }
    .stage-btn.active.closed_lost { color: var(--text-faint); }

    .notes-area {
      width: 100%;
      min-height: 90px;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      transition: border-color 0.15s;
    }
    .notes-area:focus { outline: none; border-color: var(--border-strong); }
    .notes-status {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: var(--text-faint);
      margin-top: 6px;
      min-height: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .audio-shell {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }
    .audio-shell audio {
      width: 100%;
      height: 36px;
    }

    .transcript-shell {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      max-height: 320px;
      overflow-y: auto;
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      color: var(--text-dim);
    }
    .transcript-shell::-webkit-scrollbar { width: 6px; }
    .transcript-shell::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .panel-actions {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      background: var(--surface);
    }
    .panel-actions .btn { flex: 1; justify-content: center; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface-elevated);
      border: 1px solid var(--border-strong);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      z-index: 1000;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--live);
      box-shadow: 0 0 8px var(--live);
    }
    .toast.success .toast-dot { background: var(--won); box-shadow: 0 0 8px var(--won); }

    /* MOBILE */
    @media (max-width: 900px) {
      .container { padding: 24px 16px 60px; }
      .topnav { padding: 12px 16px; }
      .business-tag, .nav-divider { display: none; }
      .page-header { flex-direction: column; align-items: stretch; }
      .header-actions { flex-wrap: wrap; }
      .search-shell { width: 100%; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .stat-value { font-size: 26px; }
      .panel { width: 100%; }
      .ctable thead th:nth-child(4),
      .ctable tbody td:nth-child(4) { display: none; }
    }

    @media (max-width: 600px) {
      .ctable thead th:nth-child(5),
      .ctable tbody td:nth-child(5) { display: none; }
      .page-title { font-size: 26px; }
    }

    /* Loading skeleton */
    .skeleton {
      animation: shimmer 1.5s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <div class="nav-left">
      <div class="logo">
        <div class="logo-mark"></div>
        <span>AI Lead Intel</span>
      </div>

        <span id="business-name">—</span>
      </div>
    </div>
    <div class="nav-right">
      <div class="live-indicator">
        <div class="live-dot"></div>
        <span>Live</span>
      </div>

      <button class="icon-btn" onclick="signOut()" title="Sign out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <div class="page-title-block">
        <div class="eyebrow">Mission Control</div>
        <h1 class="page-title">Live <span class="accent">Calls</span></h1>
      </div>
      <div class="header-actions">
        <div class="search-shell">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Search calls..." oninput="renderCalls()" />
          <span class="kbd">⌘K</span>
        </div>
        <button class="btn" onclick="exportCSV()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
        <button class="btn" onclick="loadCalls()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat" data-color="brand">
        <div class="stat-head">
          <div class="stat-label">Total Calls</div>
          <div class="stat-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </div>
        </div>
        <div class="stat-value mono" id="stat-total" data-target="0">0</div>
        <svg class="stat-spark" id="spark-total" viewBox="0 0 100 28" preserveAspectRatio="none"></svg>
      </div>

      <div class="stat" data-color="hot">
        <div class="stat-head">
          <div class="stat-label">Hot Leads</div>
          <div class="stat-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
          </div>
        </div>
        <div class="stat-value mono colored" id="stat-hot" data-target="0">0</div>
        <svg class="stat-spark" id="spark-hot" viewBox="0 0 100 28" preserveAspectRatio="none"></svg>
      </div>

      <div class="stat" data-color="won">
        <div class="stat-head">
          <div class="stat-label">Closed Won</div>
          <div class="stat-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
        <div class="stat-value mono colored" id="stat-won" data-target="0">0</div>
        <svg class="stat-spark" id="spark-won" viewBox="0 0 100 28" preserveAspectRatio="none"></svg>
      </div>

      <div class="stat" data-color="brand">
        <div class="stat-head">
          <div class="stat-label">Avg Duration</div>
          <div class="stat-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
        </div>
        <div class="stat-value mono" id="stat-duration">—</div>
        <svg class="stat-spark" id="spark-duration" viewBox="0 0 100 28" preserveAspectRatio="none"></svg>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-head">
        <div>
          <div class="chart-title">Call Volume</div>
          <div class="chart-sub">Last 30 days</div>
        </div>
        <div class="chart-stats">
          <span>Peak <b id="chart-peak">0</b></span>
          <span>Avg <b id="chart-avg">0</b></span>
          <span>Total <b id="chart-total">0</b></span>
        </div>
      </div>
      <svg class="chart-svg" id="main-chart" viewBox="0 0 1000 140" preserveAspectRatio="none"></svg>
    </div>

    <div class="calls-card">
      <div class="calls-head">
        <div class="calls-title-row">
          <div class="calls-title">Calls</div>
          <div class="calls-count mono" id="calls-count">0</div>
        </div>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
          <div class="filter-group">
            <button class="pill active" data-filter="all" onclick="setFilter('all')">All</button>
            <button class="pill hot" data-filter="HOT" onclick="setFilter('HOT')">Hot</button>
            <button class="pill warm" data-filter="WARM" onclick="setFilter('WARM')">Warm</button>
            <button class="pill cold" data-filter="COLD" onclick="setFilter('COLD')">Cold</button>
          </div>
          <div class="filter-group">
            <button class="pill" data-date="today" onclick="setDateFilter('today')">Today</button>
            <button class="pill" data-date="week" onclick="setDateFilter('week')">7d</button>
            <button class="pill" data-date="month" onclick="setDateFilter('month')">30d</button>
            <button class="pill active" data-date="all" onclick="setDateFilter('all')">All</button>
          </div>
        </div>
      </div>
      <div class="table-wrap" id="calls-container">
        <div class="empty"><div class="empty-glyph">⏳</div><div class="empty-title skeleton">Loading...</div></div>
      </div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
  <aside class="panel" id="panel">
    <div class="panel-head">
      <div>
        <h3 id="panel-title">Call Details</h3>
        <div class="panel-meta mono" id="panel-meta">—</div>
      </div>
      <button class="icon-btn" onclick="closePanel()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="panel-body" id="panel-body"></div>
    <div class="panel-actions" id="panel-actions"></div>
  </aside>

  <div class="toast" id="toast">
    <div class="toast-dot"></div>
    <span id="toast-text"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://mbrhkeddgmywqqgdfdgx.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable__YkhmAu61Nr8VetJS8pJqA_MHrmO69t';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allCalls = [];
    let currentFilter = 'all';
    let dateFilter = 'all';
    let selectedId = null;
    let realtimeChannel = null;

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/dashboard/login.html'; return; }
      document.getElementById('user-email').textContent = session.user.email;

      const { data: clients } = await sb.from('clients').select('business_name').eq('owner_user_id', session.user.id).limit(1);
      if (clients?.length) document.getElementById('business-name').textContent = clients[0].business_name;

      await loadCalls();
      setupRealtime();
      setupKeyboard();
    }

    function setupRealtime() {
      if (realtimeChannel) return;
      realtimeChannel = sb.channel('calls-changes')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'calls' },
          () => { loadCalls(); showToast('New call received', 'success'); })
        .subscribe();
    }

    function setupKeyboard() {
      document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
          e.preventDefault();
          document.getElementById('search-input').focus();
        }
        if (e.key === 'Escape') closePanel();
      });
    }

    async function loadCalls() {
      const { data: calls, error } = await sb.from('calls').select('*').order('created_at', { ascending: false }).limit(200);
      if (error) {
        document.getElementById('calls-container').innerHTML = `<div class="empty"><div class="empty-glyph">⚠</div><div class="empty-title">${error.message}</div></div>`;
        return;
      }
      allCalls = calls || [];
      updateStats();
      updateChart();
      renderCalls();
    }

    function animateNumber(el, target) {
      const start = parseInt(el.dataset.target || '0', 10);
      const duration = 600;
      const startTime = performance.now();
      function tick(t) {
        const p = Math.min((t - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        const current = Math.floor(start + (target - start) * eased);
        el.textContent = current;
        if (p < 1) requestAnimationFrame(tick);
        else el.dataset.target = target;
      }
      requestAnimationFrame(tick);
    }

    function updateStats() {
      const total = allCalls.length;
      const hot = allCalls.filter(c => c.lead_score === 'HOT').length;
      const won = allCalls.filter(c => c.lead_status === 'CLOSED_WON').length;
      const totalDur = allCalls.reduce((s, c) => s + (c.duration_seconds || 0), 0);
      const avg = total > 0 ? Math.round(totalDur / total) : 0;

      animateNumber(document.getElementById('stat-total'), total);
      animateNumber(document.getElementById('stat-hot'), hot);
      animateNumber(document.getElementById('stat-won'), won);

      const dur = document.getElementById('stat-duration');
      if (total > 0) {
        const m = Math.floor(avg / 60), s = avg % 60;
        dur.textContent = `${m}:${String(s).padStart(2, '0')}`;
      } else dur.textContent = '—';

      drawSparkline('spark-total', getDailyCounts(c => true), '#ff6a00');
      drawSparkline('spark-hot', getDailyCounts(c => c.lead_score === 'HOT'), '#ef4444');
      drawSparkline('spark-won', getDailyCounts(c => c.lead_status === 'CLOSED_WON'), '#10b981');
      drawSparkline('spark-duration', getDailyDurations(), '#ff6a00');
    }

    function getDailyCounts(filterFn) {
      const days = [];
      const today = new Date(); today.setHours(0,0,0,0);
      for (let i = 13; i >= 0; i--) {
        const d = new Date(today); d.setDate(d.getDate() - i);
        const next = new Date(d); next.setDate(next.getDate() + 1);
        days.push(allCalls.filter(c => {
          const t = new Date(c.created_at);
          return t >= d && t < next && filterFn(c);
        }).length);
      }
      return days;
    }

    function getDailyDurations() {
      const days = [];
      const today = new Date(); today.setHours(0,0,0,0);
      for (let i = 13; i >= 0; i--) {
        const d = new Date(today); d.setDate(d.getDate() - i);
        const next = new Date(d); next.setDate(next.getDate() + 1);
        const dayCalls = allCalls.filter(c => {
          const t = new Date(c.created_at);
          return t >= d && t < next;
        });
        const avg = dayCalls.length ? dayCalls.reduce((s, c) => s + (c.duration_seconds || 0), 0) / dayCalls.length : 0;
        days.push(Math.round(avg));
      }
      return days;
    }

    function drawSparkline(id, data, color) {
      const svg = document.getElementById(id);
      if (!svg) return;
      const w = 100, h = 28;
      const max = Math.max(...data, 1);
      const min = 0;
      const points = data.map((v, i) => {
        const x = (i / (data.length - 1)) * w;
        const y = h - ((v - min) / (max - min || 1)) * (h - 4) - 2;
        return [x, y];
      });
      const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
      const areaPath = `${path} L${w},${h} L0,${h} Z`;
      const gradId = id + '-grad';
      svg.innerHTML = `
        <defs>
          <linearGradient id="${gradId}" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="${areaPath}" fill="url(#${gradId})"/>
        <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      `;
    }

    function updateChart() {
      const svg = document.getElementById('main-chart');
      const W = 1000, H = 140;
      const days = [];
      const today = new Date(); today.setHours(0,0,0,0);
      for (let i = 29; i >= 0; i--) {
        const d = new Date(today); d.setDate(d.getDate() - i);
        const next = new Date(d); next.setDate(next.getDate() + 1);
        const count = allCalls.filter(c => {
          const t = new Date(c.created_at);
          return t >= d && t < next;
        }).length;
        days.push({ date: d, count });
      }
      const max = Math.max(...days.map(d => d.count), 4);
      const total = days.reduce((s, d) => s + d.count, 0);
      const avg = (total / 30).toFixed(1);
      document.getElementById('chart-peak').textContent = max;
      document.getElementById('chart-avg').textContent = avg;
      document.getElementById('chart-total').textContent = total;

      const padX = 12, padY = 14;
      const points = days.map((d, i) => {
        const x = padX + (i / (days.length - 1)) * (W - padX * 2);
        const y = H - padY - (d.count / max) * (H - padY * 2);
        return [x, y, d];
      });

      // Smooth curve
      let path = `M${points[0][0]},${points[0][1]}`;
      for (let i = 1; i < points.length; i++) {
        const [x1, y1] = points[i - 1];
        const [x2, y2] = points[i];
        const cx = (x1 + x2) / 2;
        path += ` C${cx},${y1} ${cx},${y2} ${x2},${y2}`;
      }
      const areaPath = `${path} L${points[points.length-1][0]},${H} L${points[0][0]},${H} Z`;

      // Grid lines
      const gridLines = [0.25, 0.5, 0.75].map(p => {
        const y = padY + p * (H - padY * 2);
        return `<line x1="${padX}" y1="${y}" x2="${W - padX}" y2="${y}" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="2 4"/>`;
      }).join('');

      // Date labels (every 5 days)
      const labels = points.filter((_, i) => i % 5 === 0 || i === points.length - 1).map(p => {
        const dateStr = p[2].date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        return `<text x="${p[0]}" y="${H - 2}" font-family="Geist Mono, monospace" font-size="9" fill="#555" text-anchor="middle">${dateStr}</text>`;
      }).join('');

      svg.innerHTML = `
        <defs>
          <linearGradient id="chart-grad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#ff6a00" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
          </linearGradient>
        </defs>
        ${gridLines}
        <path d="${areaPath}" fill="url(#chart-grad)"/>
        <path d="${path}" fill="none" stroke="#ff6a00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${points.map(p => `<circle cx="${p[0]}" cy="${p[1]}" r="2" fill="#0a0a0a" stroke="#ff6a00" stroke-width="1.5"/>`).join('')}
        ${labels}
      `;
    }

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.pill[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
      renderCalls();
    }
    function setDateFilter(f) {
      dateFilter = f;
      document.querySelectorAll('.pill[data-date]').forEach(b => b.classList.toggle('active', b.dataset.date === f));
      renderCalls();
    }

    function getFiltered() {
      let f = allCalls;
      if (currentFilter !== 'all') f = f.filter(c => c.lead_score === currentFilter);
      if (dateFilter !== 'all') {
        const now = new Date();
        let cutoff;
        if (dateFilter === 'today') { cutoff = new Date(now); cutoff.setHours(0,0,0,0); }
        else if (dateFilter === 'week') { cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 7); }
        else if (dateFilter === 'month') { cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 30); }
        f = f.filter(c => new Date(c.created_at) >= cutoff);
      }
      const q = document.getElementById('search-input').value.trim().toLowerCase();
      if (q) f = f.filter(c => (c.caller_number || '').toLowerCase().includes(q) || (c.outcome || '').toLowerCase().includes(q) || (c.summary || '').toLowerCase().includes(q));
      return f;
    }

    function renderCalls() {
      const container = document.getElementById('calls-container');
      const filtered = getFiltered();
      document.getElementById('calls-count').textContent = filtered.length;

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty"><div class="empty-glyph">📞</div><div class="empty-title">No calls match</div><div class="empty-sub">Try adjusting your filters or search.</div></div>`;
        return;
      }

      let html = `<table class="ctable"><thead><tr><th>Caller</th><th>Lead</th><th>Stage</th><th>Outcome</th><th>Time</th><th style="text-align:right">Duration</th></tr></thead><tbody>`;
      filtered.forEach(call => {
        const score = call.lead_score || 'NONE';
        const status = call.lead_status || 'NEW';
        const m = Math.floor((call.duration_seconds || 0) / 60), s = (call.duration_seconds || 0) % 60;
        const dur = `${m}:${String(s).padStart(2, '0')}`;
        const num = call.caller_number || 'Unknown';
        const initials = num.replace(/\D/g, '').slice(-2) || '??';
        const isSelected = selectedId === call.id ? 'selected' : '';
        html += `
          <tr class="${isSelected}" onclick="openPanel('${call.id}')">
            <td>
              <div class="caller">
                <div class="caller-avatar mono">${initials}</div>
                <div class="caller-num">${escapeHtml(num)}</div>
              </div>
            </td>
            <td><span class="badge ${score.toLowerCase()}"><span class="badge-dot"></span>${score}</span></td>
            <td>${status === 'NEW' ? '<span class="stage-pill">New</span>' : `<span class="stage-pill ${status.toLowerCase()}">${formatStage(status)}</span>`}</td>
            <td class="outcome-cell">${escapeHtml(call.outcome || '—')}</td>
            <td class="time-cell">${formatTime(call.created_at)}</td>
            <td class="duration-cell" style="text-align:right">${dur}</td>
          </tr>
        `;
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function openPanel(callId) {
      const call = allCalls.find(c => c.id === callId);
      if (!call) return;
      selectedId = callId;
      renderCalls();

      const score = call.lead_score || 'NONE';
      const status = call.lead_status || 'NEW';
      const m = Math.floor((call.duration_seconds || 0) / 60), s = (call.duration_seconds || 0) % 60;
      const dur = `${m}:${String(s).padStart(2, '0')}`;
      const dateStr = new Date(call.created_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });

      document.getElementById('panel-title').textContent = call.caller_number || 'Unknown';
      document.getElementById('panel-meta').innerHTML = `${dateStr} · <span style="color:var(--text-dim)">${dur}</span>`;

      const body = document.getElementById('panel-body');
      body.innerHTML = `
        <div class="panel-section">
          <div class="panel-section-label">Overview</div>
          <div class="panel-meta-grid">
            <div class="meta-item">
              <div class="meta-item-label">Lead Score</div>
              <div class="meta-item-value"><span class="badge ${score.toLowerCase()}"><span class="badge-dot"></span>${score}</span></div>
            </div>
            <div class="meta-item">
              <div class="meta-item-label">Duration</div>
              <div class="meta-item-value">${dur}</div>
            </div>
          </div>
        </div>

        ${call.summary ? `
          <div class="panel-section">
            <div class="panel-section-label">Summary</div>
            <div class="summary-block">${escapeHtml(call.summary)}</div>
          </div>
        ` : ''}

        <div class="panel-section">
          <div class="panel-section-label">Pipeline Stage</div>
          <div class="stage-buttons">
            <button class="stage-btn ${status === 'NEW' ? 'active' : ''}" onclick="updateStatus('${call.id}', 'NEW')">New</button>
            <button class="stage-btn ${status === 'CONTACTED' ? 'active contacted' : ''}" onclick="updateStatus('${call.id}', 'CONTACTED')">Contacted</button>
            <button class="stage-btn ${status === 'CLOSED_WON' ? 'active closed_won' : ''}" onclick="updateStatus('${call.id}', 'CLOSED_WON')">Won</button>
            <button class="stage-btn ${status === 'CLOSED_LOST' ? 'active closed_lost' : ''}" onclick="updateStatus('${call.id}', 'CLOSED_LOST')">Lost</button>
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-section-label">Notes</div>
          <textarea class="notes-area" id="notes-${call.id}" placeholder="Add follow-up notes...">${escapeHtml(call.notes || '')}</textarea>
          <div class="notes-status" id="notes-status-${call.id}"></div>
        </div>

        ${call.recording_url ? `
          <div class="panel-section">
            <div class="panel-section-label">Recording</div>
            <div class="audio-shell">
              <audio controls preload="none" src="${escapeAttr(call.recording_url)}"></audio>
            </div>
          </div>
        ` : ''}

        <div class="panel-section">
          <div class="panel-section-label">Transcript</div>
          <div class="transcript-shell">${escapeHtml(call.transcript || 'No transcript available')}</div>
        </div>
      `;

      document.getElementById('panel-actions').innerHTML = `
        <a href="tel:${escapeAttr(call.caller_number)}" class="btn primary">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Call back
        </a>
        ${call.recording_url ? `<a href="${escapeAttr(call.recording_url)}" target="_blank" class="btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Open recording
        </a>` : ''}
      `;

      // Notes auto-save
      const ta = document.getElementById(`notes-${call.id}`);
      if (ta) {
        let timeout;
        ta.addEventListener('input', () => {
          clearTimeout(timeout);
          document.getElementById(`notes-status-${call.id}`).textContent = '· Saving';
          timeout = setTimeout(() => saveNotes(call.id, ta.value), 800);
        });
      }

      document.getElementById('panel').classList.add('open');
      document.getElementById('panel-overlay').classList.add('open');
    }

    function closePanel() {
      document.getElementById('panel').classList.remove('open');
      document.getElementById('panel-overlay').classList.remove('open');
      selectedId = null;
      renderCalls();
    }

    async function updateStatus(callId, newStatus) {
      const { error } = await sb.from('calls').update({ lead_status: newStatus }).eq('id', callId);
      if (error) { showToast('Update failed'); return; }
      const call = allCalls.find(c => c.id === callId);
      if (call) call.lead_status = newStatus;
      updateStats();
      openPanel(callId); // re-render panel
      showToast('Stage updated', 'success');
    }

    async function saveNotes(callId, notes) {
      const status = document.getElementById(`notes-status-${callId}`);
      const { error } = await sb.from('calls').update({ notes, notes_updated_at: new Date().toISOString() }).eq('id', callId);
      if (error) { status.textContent = '· Save failed'; return; }
      const call = allCalls.find(c => c.id === callId);
      if (call) call.notes = notes;
      status.textContent = '· Saved';
      setTimeout(() => { if (status) status.textContent = ''; }, 2000);
    }

    function exportCSV() {
      const filtered = getFiltered();
      if (!filtered.length) { showToast('No calls to export'); return; }
      const headers = ['Date', 'Caller', 'Duration (s)', 'Lead Score', 'Stage', 'Outcome', 'Summary', 'Notes'];
      const rows = filtered.map(c => [
        new Date(c.created_at).toISOString(),
        c.caller_number || '',
        c.duration_seconds || 0,
        c.lead_score || '',
        c.lead_status || 'NEW',
        c.outcome || '',
        (c.summary || '').replace(/\n/g, ' '),
        (c.notes || '').replace(/\n/g, ' '),
      ]);
      const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `calls-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('Exported', 'success');
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      document.getElementById('toast-text').textContent = msg;
      t.className = 'toast show ' + (type || '');
      setTimeout(() => t.className = 'toast ' + (type || ''), 2500);
    }

    function formatStage(s) {
      if (s === 'CLOSED_WON') return 'Won';
      if (s === 'CLOSED_LOST') return 'Lost';
      if (s === 'CONTACTED') return 'Contacted';
      return 'New';
    }
    function formatTime(ts) {
      const d = new Date(ts), now = new Date();
      const dm = Math.floor((now - d) / 60000);
      if (dm < 1) return 'just now';
      if (dm < 60) return `${dm}m ago`;
      const dh = Math.floor(dm / 60);
      if (dh < 24) return `${dh}h ago`;
      const dd = Math.floor(dh / 24);
      if (dd < 7) return `${dd}d ago`;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function escapeAttr(str) { return escapeHtml(str); }

    async function signOut() {
      if (realtimeChannel) sb.removeChannel(realtimeChannel);
      await sb.auth.signOut();
      window.location.href = '/dashboard/login.html';
    }

    init();
  </script>
</body>
</html>
